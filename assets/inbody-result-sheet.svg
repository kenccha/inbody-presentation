<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 500" fill="none">
  <!-- Title -->
  <text x="175" y="28" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" font-weight="700" fill="#e4e6ea" letter-spacing="1.5">InBody Result Sheet</text>
  <line x1="30" y1="40" x2="320" y2="40" stroke="#8a8f9a" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Section label -->
  <text x="30" y="62" font-family="sans-serif" font-size="10" fill="#8a8f9a" letter-spacing="0.5">체성분 분석</text>

  <!-- Bar 1: 체수분 (Body Water) 65% -->
  <text x="30" y="92" font-family="sans-serif" font-size="12" font-weight="600" fill="#e4e6ea">체수분</text>
  <rect x="90" y="80" width="210" height="16" rx="3" fill="#1a2130"/>
  <rect x="90" y="80" width="136.5" height="16" rx="3" fill="#005b9e"/>
  <text x="308" y="92" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="600" fill="#005b9e">65%</text>

  <!-- Bar 2: 단백질 (Protein) 70% -->
  <text x="30" y="124" font-family="sans-serif" font-size="12" font-weight="600" fill="#e4e6ea">단백질</text>
  <rect x="90" y="112" width="210" height="16" rx="3" fill="#1a2130"/>
  <rect x="90" y="112" width="147" height="16" rx="3" fill="#8a8f9a"/>
  <text x="308" y="124" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="600" fill="#8a8f9a">70%</text>

  <!-- Bar 3: 무기질 (Minerals) 80% -->
  <text x="30" y="156" font-family="sans-serif" font-size="12" font-weight="600" fill="#e4e6ea">무기질</text>
  <rect x="90" y="144" width="210" height="16" rx="3" fill="#1a2130"/>
  <rect x="90" y="144" width="168" height="16" rx="3" fill="#8a8f9a"/>
  <text x="308" y="156" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="600" fill="#8a8f9a">80%</text>

  <!-- Bar 4: 체지방 (Body Fat) 45% -->
  <text x="30" y="188" font-family="sans-serif" font-size="12" font-weight="600" fill="#e4e6ea">체지방</text>
  <rect x="90" y="176" width="210" height="16" rx="3" fill="#1a2130"/>
  <rect x="90" y="176" width="94.5" height="16" rx="3" fill="#e8b73a"/>
  <text x="308" y="188" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="600" fill="#e8b73a">45%</text>

  <!-- Bar 5: 골격근량 (Skeletal Muscle) 75% -->
  <text x="30" y="220" font-family="sans-serif" font-size="12" font-weight="600" fill="#e4e6ea">골격근량</text>
  <rect x="90" y="208" width="210" height="16" rx="3" fill="#1a2130"/>
  <rect x="90" y="208" width="157.5" height="16" rx="3" fill="#ac0430"/>
  <text x="308" y="220" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="600" fill="#ac0430">75%</text>

  <!-- Divider -->
  <line x1="30" y1="242" x2="320" y2="242" stroke="#8a8f9a" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Segment Analysis Label -->
  <text x="30" y="264" font-family="sans-serif" font-size="10" fill="#8a8f9a" letter-spacing="0.5">부위별 근육 분석</text>

  <!-- Body Segment Diagram -->
  <!-- Head -->
  <circle cx="175" cy="290" r="12" stroke="#8a8f9a" stroke-width="1.5" fill="none"/>

  <!-- Neck -->
  <line x1="175" y1="302" x2="175" y2="310" stroke="#8a8f9a" stroke-width="1.5"/>

  <!-- Trunk -->
  <rect x="155" y="310" width="40" height="55" rx="4" stroke="#8a8f9a" stroke-width="1.5" fill="none"/>

  <!-- Left Arm -->
  <rect x="118" y="312" width="35" height="14" rx="3" stroke="#8a8f9a" stroke-width="1.5" fill="none"/>

  <!-- Right Arm -->
  <rect x="197" y="312" width="35" height="14" rx="3" stroke="#8a8f9a" stroke-width="1.5" fill="none"/>

  <!-- Left Leg -->
  <rect x="155" y="367" width="18" height="50" rx="3" stroke="#8a8f9a" stroke-width="1.5" fill="none"/>

  <!-- Right Leg -->
  <rect x="177" y="367" width="18" height="50" rx="3" stroke="#8a8f9a" stroke-width="1.5" fill="none"/>

  <!-- Segment Status Indicators -->
  <!-- Left Arm indicator -->
  <circle cx="105" cy="319" r="5" fill="#ac0430"/>
  <text x="105" y="336" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8a8f9a">좌완</text>

  <!-- Right Arm indicator -->
  <circle cx="245" cy="319" r="5" fill="#005b9e"/>
  <text x="245" y="336" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8a8f9a">우완</text>

  <!-- Trunk indicator -->
  <circle cx="175" cy="342" r="5" fill="#ac0430"/>
  <text x="175" y="357" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8a8f9a">체간</text>

  <!-- Left Leg indicator -->
  <circle cx="140" cy="392" r="5" fill="#e8b73a"/>
  <text x="140" y="409" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8a8f9a">좌각</text>

  <!-- Right Leg indicator -->
  <circle cx="210" cy="392" r="5" fill="#005b9e"/>
  <text x="210" y="409" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8a8f9a">우각</text>

  <!-- Legend for indicators -->
  <circle cx="110" cy="438" r="4" fill="#ac0430"/>
  <text x="118" y="441" font-family="sans-serif" font-size="8" fill="#8a8f9a">표준 이상</text>
  <circle cx="170" cy="438" r="4" fill="#e8b73a"/>
  <text x="178" y="441" font-family="sans-serif" font-size="8" fill="#8a8f9a">표준</text>
  <circle cx="218" cy="438" r="4" fill="#005b9e"/>
  <text x="226" y="441" font-family="sans-serif" font-size="8" fill="#8a8f9a">표준 이하</text>

  <!-- Bottom divider -->
  <line x1="30" y1="456" x2="320" y2="456" stroke="#8a8f9a" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Bottom label -->
  <text x="175" y="478" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8a8f9a" letter-spacing="0.5">30초 측정 결과</text>
</svg>